services:

  postgres:
    image: postgres:16-alpine
    container_name: probeacon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: probeacon
      POSTGRES_USER: probeacon
      POSTGRES_PASSWORD: probeacon_dev
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U probeacon"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: probeacon-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: probeacon
      CLICKHOUSE_USER: probeacon
      CLICKHOUSE_PASSWORD: probeacon_dev
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: probeacon-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: probeacon
      RABBITMQ_DEFAULT_PASS: probeacon_dev
      RABBITMQ_DEFAULT_VHOST: probeacon
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI → http://localhost:15672
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

